name: BoitesALivresNative
options:
  bundleIdPrefix: com.malikkaraoui
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
configs:
  Debug: debug
  Release: release
targets:
  BoitesALivresNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BoitesALivresNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.malikkaraoui.boitesalivresapp
        INFOPLIST_FILE: BoitesALivresNative/Info.plist
        SWIFT_VERSION: 5.9
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: 8FCH32RKR5
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    scheme:
      testTargets: []
